services:
  postgres:
    image: postgres:16-alpine
    ports:
      - '5435:5432'
    environment:
      POSTGRES_USER: cadence
      POSTGRES_PASSWORD: cadence
      POSTGRES_DB: cadence
    volumes:
      - cadence_pg:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U cadence']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  cadence_pg:
