<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0f1729" />
    <title>Cadence — Relationship Operating System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      #boot-fallback {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: Inter, system-ui, sans-serif;
        background: #f4f6fb;
        color: #0f172a;
        text-align: center;
      }
      #boot-fallback strong {
        display: block;
        font-size: 1.25rem;
        margin-bottom: 8px;
      }
      #boot-fallback p {
        margin: 0;
        color: #64748b;
        max-width: 420px;
        line-height: 1.5;
      }
      #boot-fallback a {
        color: #6366f1;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="boot-fallback">
        <div>
          <strong>Loading Cadence…</strong>
          <p>If this stays blank for more than a few seconds, hard refresh (Ctrl + Shift + R).</p>
        </div>
      </div>
    </div>
    <script>
      window.__cadenceMounted = false;
      function showBootError(message) {
        if (window.__cadenceMounted) return;
        var root = document.getElementById('root');
        if (!root) return;
        root.innerHTML =
          '<div id="boot-fallback"><div><strong>Cadence could not start</strong><p>' +
          message +
          '</p><p style="margin-top:12px"><a href="/login">Open login page</a></p></div></div>';
      }
      window.addEventListener('error', function (event) {
        showBootError(event.message || 'A script failed to load.');
      });
      window.addEventListener('unhandledrejection', function (event) {
        var reason = event.reason && event.reason.message ? event.reason.message : 'Unknown error';
        showBootError(reason);
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
