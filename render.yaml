# Render.com blueprint — API + PostgreSQL
# Dashboard → New → Blueprint → connect GitHub repo

services:
  - type: web
    name: cadence-api
    runtime: node
    plan: free
    buildCommand: >-
      pnpm install &&
      pnpm --filter @cadence/shared build &&
      pnpm --filter @cadence/api build &&
      pnpm --filter @cadence/api exec prisma generate &&
      pnpm --filter @cadence/api exec prisma db push
    startCommand: pnpm --filter @cadence/api start
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cadence-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_VERSION
        value: "22"
      - key: PUBLIC_API_URL
        sync: false

databases:
  - name: cadence-db
    plan: free
